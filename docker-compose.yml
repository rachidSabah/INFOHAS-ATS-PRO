# ResumeAI Pro — Docker Compose
# Local multi-service stack: Next.js web + Ollama (optional local LLM) + MinIO (S3-compatible R2 stand-in).
# Usage: docker compose up

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      STORAGE_DRIVER: local
      NEXTAUTH_URL: http://localhost:3000

  # Optional: self-hosted LLM via Ollama
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles: ["llm"]
    restart: unless-stopped

  # MinIO as a local R2 stand-in
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: resumeai
      MINIO_ROOT_PASSWORD: resumeai-secret
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  ollama-data:
  minio-data:
