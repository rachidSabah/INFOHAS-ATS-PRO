# ResumeAI Pro — Cloudflare Worker API config
# NOTE: This file is for the Workers API deployment only.
# Cloudflare Pages uses its own build process (next-on-pages).
# The pages_build_output_dir is NOT set here to avoid conflicts with Pages auto-build.

name = "resumeai-pro-api"
main = "workers/api/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "resumeai-pro-db"
database_id = "4485ee27-7fec-4077-a39d-c5cc4b1b9167"

# KV namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "4521e79873524900bb373a245d095fcf"

[vars]
APP_NAME = "ResumeAI Pro"
APP_URL = "https://resumeai-pro.pages.dev"
# CORS_ORIGIN: Set to "*" to allow all origins (needed for Cloudflare Pages
# preview deployments which have dynamic URLs like bcf5bbd9.resumeai-pro.pages.dev).
# For production with a custom domain, set to "https://yourdomain.com".
CORS_ORIGIN = "*"

[observability]
enabled = true

[placement]
mode = "smart"
