# ResumeAI Pro — Cloudflare Worker API config
name = "resumeai-pro-api"
main = "workers/api/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "resumeai-pro-db"
database_id = "4485ee27-7fec-4077-a39d-c5cc4b1b9167"

# KV namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "4521e79873524900bb373a245d095fcf"

[vars]
APP_NAME = "ResumeAI Pro"
APP_URL = "https://resumeai-pro.pages.dev"
CORS_ORIGIN = "https://resumeai-pro.pages.dev"

[observability]
enabled = true

[placement]
mode = "smart"
