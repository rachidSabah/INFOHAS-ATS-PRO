# Pipeline Worker — Durable Object for real-time pipeline WebSocket updates.
# Deployed as a separate Worker so the main API worker can stay on the free tier.
# Requires Workers Paid plan ($5/month) for Durable Objects.

name = "resumeai-pro-pipeline"
main = "workers/pipeline-do/worker.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Durable Objects binding
[[durable_objects.bindings]]
name = "PIPELINE_DO"
class_name = "PipelineDurableObject"

# Durable Object migrations — required for the first deploy.
# Each entry describes a migration: new class, renamed class, or deleted class.
[[migrations]]
tag = "v1"
new_classes = ["PipelineDurableObject"]

[vars]
APP_NAME = "ResumeAI Pro Pipeline"
CORS_ORIGIN = "https://resumeai-pro.pages.dev"

[observability]
enabled = true

[placement]
mode = "smart"
